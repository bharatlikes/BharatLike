name = "bharatlike-comments"
main = "index.js"
compatibility_date = "2024-01-01"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "bharatlike-blog"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[triggers]
routes = [
  { pattern = "www.bharatlike.com/api/*", zone_name = "bharatlike.com" }
]
